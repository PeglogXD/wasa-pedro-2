<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Showdown: Chromebook Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0; padding: 0; background-color: #0b0b14; color: #fff;
            font-family: 'Press Start 2P', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }
        #game-container {
            position: relative; width: 800px; height: 450px;
            border: 6px double #4a4a7a; box-shadow: 0 0 30px rgba(0,0,0,0.8); background: #000;
        }
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(12, 12, 23, 0.95); z-index: 10; padding: 20px; text-align: center;
        }
        .hidden { display: none !important; }
        h1 { font-size: 24px; color: #ff2a6d; text-shadow: 3px 3px #05d9e8; margin-bottom: 5px; }
        h2 { font-size: 12px; color: #f5b041; margin-bottom: 20px; }
        .btn {
            background: #2a2a4a; color: white; border: 3px solid #4a4a7a;
            padding: 10px 20px; font-family: 'Press Start 2P', monospace; font-size: 11px;
            cursor: pointer; margin: 8px; box-shadow: 4px 4px #000;
        }
        .btn:hover:not(:disabled) { background: #ff2a6d; border-color: #fff; }
        .btn:disabled { background: #222 !important; border-color: #444 !important; color: #666 !important; box-shadow: none !important; }
        .input-retro {
            font-family: 'Press Start 2P', monospace; font-size: 16px; padding: 8px;
            background: #111; border: 2px solid #4a4a7a; color: #05d9e8; text-align: center; margin: 10px; letter-spacing: 4px;
        }
        .lobby-panel { display: flex; justify-content: space-between; width: 90%; background: #141424; border: 3px dashed #4a4a7a; padding: 15px; margin-bottom: 15px; }
        .player-slot { width: 48%; padding: 10px; background: #0c0c17; border: 2px solid #333; text-align: left; }
        .player-slot.connected { border-color: #05d9e8; }
        .player-title { font-size: 10px; margin-bottom: 8px; color: #aaa; }
        .player-slot.connected .player-title { color: #05ff60; }
        .char-preview-text { font-size: 8px; color: #f5b041; line-height: 1.4; margin-top: 5px; }
        .map-select-area { font-size: 9px; margin-bottom: 15px; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 15px 20px; z-index: 5; pointer-events: none; }
        .player-hud { width: 40%; }
        .bar-container { width: 100%; height: 14px; background: #222; border: 2px solid #fff; margin-top: 4px; }
        .hp-bar { width: 100%; height: 100%; background: #05ff60; transition: width 0.1s; }
        .sp-bar { width: 0%; height: 100%; background: #f5b041; transition: width 0.1s; }
        .status-msg { font-size: 9px; color: #ff2a6d; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud" class="hidden">
            <div class="player-hud">
                <div id="name-p1" style="font-size:9px;">P1</div>
                <div class="bar-container"><div class="hp-bar" id="hp-p1"></div></div>
                <div class="bar-container" style="height:6px; margin-top:2px;"><div class="sp-bar" id="sp-p1"></div></div>
            </div>
            <div class="player-hud" style="text-align: right;">
                <div id="name-p2" style="font-size:9px;">P2</div>
                <div class="bar-container"><div class="hp-bar" id="hp-p2" style="float: right;"></div></div>
                <div class="bar-container" style="height:6px; margin-top:2px;"><div class="sp-bar" id="sp-p2" style="float: right;"></div></div>
            </div>
        </div>

        <div id="screen-menu" class="screen">
            <h1>RETRO SHOWDOWN</h1>
            <h2>CHROMEBOOK CLOUD EDITION</h2>
            <button class="btn" onclick="initRoom('host')">CREAR SALA</button>
            <button class="btn" onclick="showJoinScreen()">UNIRSE A SALA</button>
        </div>

        <div id="screen-lobby-join" class="screen hidden">
            <h2>UNIRSE A LA BATALLA</h2>
            <p style="font-size:10px;">Código de 4 dígitos:</p>
            <input type="text" id="input-room-id" class="input-retro" maxlength="4" placeholder="0000">
            <button class="btn" id="btn-connect-client" onclick="initRoom('client')">CONECTAR</button>
            <div class="status-msg" id="client-status"></div>
            <button class="btn" onclick="location.reload()">ATRÁS</button>
        </div>

        <div id="screen-lobby-room" class="screen hidden">
            <h2>SALA DE ESPERA</h2>
            <div style="font-size: 11px; margin-bottom: 15px; color:#05d9e8;">
                CÓDIGO DE SALA: <span id="room-code-display" style="font-size:18px; color:#fff; background:#111; padding:4px 10px; border:1px solid #4a4a7a;">----</span>
            </div>
            <div class="lobby-panel">
                <div class="player-slot connected" id="slot-p1">
                    <div class="player-title">🕹️ JUGADOR 1</div>
                    <div id="name-preview-p1" style="font-size:9px;">Seleccionando...</div>
                    <div class="char-preview-text" id="desc-preview-p1"></div>
                </div>
                <div class="player-slot" id="slot-p2">
                    <div class="player-title" id="title-p2">🚫 BUSCANDO...</div>
                    <div id="name-preview-p2" style="font-size:9px; color:#666;">Vacío</div>
                    <div class="char-preview-text" id="desc-preview-p2"></div>
                </div>
            </div>
            <div class="map-select-area">
                <span>Escenario: </span><span id="map-name-display" style="color:#05d9e8;">Castillo Ancestral</span>
                <button class="btn" id="change-map-btn" onclick="cycleMap()" style="padding:4px 8px; font-size:8px;">Cambiar</button>
            </div>
            <button class="btn" id="start-match-btn" disabled onclick="hostStartGame()">¡INICIAR COMBATE!</button>
            <button class="btn" onclick="location.reload()" style="background:#4a1a1a; font-size:8px;">SALIR</button>
            <div class="status-msg" id="lobby-error-msg">Conectando al servidor central...</div>
        </div>

        <div id="screen-over" class="screen hidden">
            <h1 id="victory-text">¡GANADOR!</h1>
            <button class="btn" onclick="location.reload()">VOLVER</button>
        </div>

        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const CHARACTERS = [
        { name: "GUERRERO", color: "#05d9e8", weapon: "sword", desc: "Espada potente.\nSúper: Torbellino.", hp: 130, speed: 4 },
        { name: "ARQUERO", color: "#05ff60", weapon: "bow", desc: "Ataques veloces.\nSúper: Ráfaga.", hp: 95, speed: 5.5 },
        { name: "MAGO", color: "#b537ff", weapon: "magic", desc: "Disparos mágicos.\nSúper: Vórtice.", hp: 105, speed: 4.5 }
    ];

    const MAPS = [
        { name: "Castillo Ancestral", bgGrad: ["#141424", "#080811"], platColor: "#4a4a6a", decoration: "castle" },
        { name: "Fisura de Lava", bgGrad: ["#240808", "#0f0303"], platColor: "#ff4500", decoration: "lava" },
        { name: "Estación Cyber", bgGrad: ["#02111a", "#010508"], platColor: "#05d9e8", decoration: "cyber" }
    ];

    const PLATFORMS = [{x: 0, y: 400, w: 800, h: 50}, {x: 120, y: 280, w: 180, h: 15}, {x: 500, y: 280, w: 180, h: 15}, {x: 300, y: 180, w: 200, h: 15}];

    let ws = null;
    let role = null, roomId = null;
    let p1Choice = 0, p2Choice = 0, selectedMapIndex = 0;
    let isP2Connected = false;
    
    let inputs = { KeyA: false, KeyD: false, KeyW: false, KeyF: false, KeyG: false };
    let player1 = null, player2 = null;
    let projectiles = [], particles = [], screenShake = 0, gameLoopId = null;

    function changeScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById('hud').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    function showJoinScreen() { changeScreen('screen-lobby-join'); }

    // SERVIDOR PÚBLICO WEBSOCKET DE RETRANSMISIÓN COMPATIBLE CON CHROMEBOOKS
    function initRoom(selectedRole) {
        role = selectedRole;
        changeScreen('screen-lobby-room');
        
        ws = new WebSocket("wss://socketsbay.com/wss/v2/1/demo/"); // Canal limpio público

        ws.onopen = () => {
            if (role === 'host') {
                roomId = Math.floor(1000 + Math.random() * 9000).toString(); // Código de 4 números corto
                document.getElementById('room-code-display').innerText = roomId;
                document.getElementById('lobby-error-msg').innerText = "Sala abierta. Comparte el código.";
                // Bucle de anuncio de presencia del Host
                setInterval(() => {
                    if(ws.readyState === WebSocket.OPEN) sendNet({type: 'host-heartbeat', room: roomId, p1Choice, selectedMapIndex});
                }, 800);
            } else {
                roomId = document.getElementById('input-room-id').value.trim();
                document.getElementById('room-code-display').innerText = roomId;
                document.getElementById('change-map-btn').classList.add('hidden');
                document.getElementById('lobby-error-msg').innerText = "Buscando la sala del anfitrión...";
                sendNet({type: 'client-join-request', room: roomId});
            }
        };

        ws.onmessage = (e) => {
            try {
                let msg = JSON.parse(e.data);
                if (msg.room !== roomId) return; // Ignorar otros datos públicos

                if (msg.type === 'host-heartbeat' && role === 'client') {
                    if(!isP2Connected) {
                        isP2Connected = true;
                        document.getElementById('lobby-error-msg').innerText = "¡Conectado al Host! Esperando inicio...";
                    }
                    p1Choice = msg.p1Choice;
                    selectedMapIndex = msg.selectedMapIndex;
                    updateLobbyUI();
                }
                if (msg.type === 'client-join-request' && role === 'host') {
                    isP2Connected = true;
                    sendNet({type: 'host-accept', room: roomId, p1Choice, p2Choice, selectedMapIndex});
                    updateLobbyUI();
                }
                if (msg.type === 'host-accept' && role === 'client') {
                    isP2Connected = true;
                    updateLobbyUI();
                }
                if (msg.type === 'client-choice-update' && role === 'host') {
                    p2Choice = msg.choice;
                    updateLobbyUI();
                }
                if (msg.type === 'start-combat') {
                    p1Choice = msg.p1Choice; p2Choice = msg.p2Choice; selectedMapIndex = msg.mapIndex;
                    startActualCombat();
                }
                if (msg.type === 'c-inputs' && role === 'host') {
                    if (player2) player2.remoteInputs = msg.inputs;
                }
                if (msg.type === 'h-state' && role === 'client') {
                    if (player1 && player2) {
                        player1.syncState(msg.p1); player2.syncState(msg.p2);
                        projectiles = msg.projectiles; screenShake = msg.screenShake;
                    }
                }
                if (msg.type === 'game-over') endGameDisplay(msg.winner);
            } catch(err) {}
        };
    }

    function sendNet(obj) { if(ws && ws.readyState === WebSocket.OPEN) { obj.room = roomId; ws.send(JSON.stringify(obj)); } }

    function updateLobbyUI() {
        document.getElementById('name-preview-p1').innerText = CHARACTERS[p1Choice].name;
        document.getElementById('name-preview-p1').style.color = CHARACTERS[p1Choice].color;
        document.getElementById('desc-preview-p1').innerText = CHARACTERS[p1Choice].desc;

        const slot2 = document.getElementById('slot-p2');
        if (isP2Connected) {
            slot2.classList.add('connected');
            document.getElementById('title-p2').innerText = "🕹️ JUGADOR 2";
            document.getElementById('name-preview-p2').innerText = CHARACTERS[p2Choice].name;
            document.getElementById('name-preview-p2').style.color = CHARACTERS[p2Choice].color;
            document.getElementById('desc-preview-p2').innerText = CHARACTERS[p2Choice].desc;
        }

        document.getElementById('map-name-display').innerText = MAPS[selectedMapIndex].name;
        const startBtn = document.getElementById('start-match-btn');
        if (role === 'host') {
            startBtn.classList.remove('hidden');
            if(isP2Connected) { startBtn.removeAttribute('disabled'); document.getElementById('lobby-error-msg').innerText = "¡Rival listo! Inicia cuando quieras."; }
        } else {
            startBtn.classList.add('hidden');
        }
    }

    function cycleMap() {
        if (role !== 'host') return;
        selectedMapIndex = (selectedMapIndex + 1) % MAPS.length;
        updateLobbyUI();
    }

    function hostStartGame() {
        sendNet({type: 'start-combat', p1Choice, p2Choice, mapIndex: selectedMapIndex});
        startActualCombat();
    }

    window.addEventListener('keydown', e => {
        if (['KeyA','KeyD','KeyW','KeyF','KeyG'].includes(e.code)) inputs[e.code] = true;
        if (!document.getElementById('screen-lobby-room').classList.contains('hidden')) {
            if (role === 'host' && e.code === 'KeyD') { p1Choice = (p1Choice + 1) % CHARACTERS.length; updateLobbyUI(); }
            if (role === 'client' && isP2Connected && e.code === 'KeyD') { p2Choice = (p2Choice + 1) % CHARACTERS.length; updateLobbyUI(); sendNet({type: 'client-choice-update', choice: p2Choice}); }
        }
    });
    window.addEventListener('keyup', e => { if (['KeyA','KeyD','KeyW','KeyF','KeyG'].includes(e.code)) inputs[e.code] = false; });

    class Fighter {
        constructor(index, x, y, data) {
            this.index = index; this.x = x; this.y = y; this.w = 34; this.h = 48;
            this.name = data.name; this.color = data.color; this.weapon = data.weapon;
            this.maxHp = data.hp; this.hp = data.hp; this.speed = data.speed;
            this.vx = 0; this.vy = 0; this.facing = index === 1 ? 1 : -1;
            this.grounded = false; this.attackCooldown = 0; this.superMeter = 0;
            this.isAttacking = false; this.remoteInputs = {};
        }
        update(currentInputs) {
            if (currentInputs['KeyA']) { this.vx = -this.speed; this.facing = -1; }
            else if (currentInputs['KeyD']) { this.vx = this.speed; this.facing = 1; }
            else { this.vx = 0; }
            if (currentInputs['KeyW'] && this.grounded) { this.vy = -12; this.grounded = false; }
            if (currentInputs['KeyF'] && this.attackCooldown <= 0) this.triggerAttack();
            
            this.vy += 0.6; this.x += this.vx; this.y += this.vy;
            if(this.attackCooldown > 0) this.attackCooldown--;
            if (this.x < 0) this.x = 0; if (this.x + this.w > canvas.width) this.x = canvas.width - this.w;
        }
        triggerAttack() {
            this.attackCooldown = 30;
            if (this.weapon === 'sword') {
                let target = this.index === 1 ? player2 : player1;
                let box = { x: this.facing === 1 ? this.x + this.w : this.x - 50, y: this.y, w: 50, h: this.h };
                if (box.x < target.x + target.w && box.x + box.w > target.x && box.y < target.y + target.h && box.y + box.h > target.y) {
                    target.hp -= 15; if(target.hp <= 0) { target.hp = 0; sendNet({type:'game-over', winner: this.index}); endGameDisplay(this.index); }
                }
            } else {
                projectiles.push({x: this.x + (this.facing===1?this.w:-10), y: this.y + 20, vx: this.facing*9, vy: 0, owner: this.index, w:15, h:5});
            }
        }
        syncState(s) { this.x = s.x; this.y = s.y; this.facing = s.facing; this.hp = s.hp; }
    }

    function startActualCombat() {
        changeScreen('screen-menu');
        document.getElementById('hud').classList.remove('hidden');
        player1 = new Fighter(1, 150, 200, CHARACTERS[p1Choice]);
        player2 = new Fighter(2, 600, 200, CHARACTERS[p2Choice]);
        if(gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoopId = requestAnimationFrame(battleLoop);
    }

    function battleLoop() {
        let map = MAPS[selectedMapIndex];
        if (role === 'host') {
            player1.update(inputs); player2.update(player2.remoteInputs || {});
            [player1, player2].forEach(p => {
                p.grounded = false;
                PLATFORMS.forEach(plat => {
                    if (p.x + p.w > plat.x && p.x < plat.x + plat.w && p.y + p.h >= plat.y && p.y + p.h - p.vy <= plat.y + 10 && p.vy >= 0) {
                        p.y = plat.y - p.h; p.vy = 0; p.grounded = true;
                    }
                });
            });
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let pr = projectiles[i]; pr.x += pr.vx;
                let target = pr.owner === 1 ? player2 : player1;
                if (pr.x > target.x && pr.x < target.x + target.w && pr.y > target.y && pr.y < target.y + target.h) {
                    target.hp -= 10; projectiles.splice(i, 1);
                    if(target.hp <= 0) { target.hp = 0; sendNet({type:'game-over', winner: pr.owner}); endGameDisplay(pr.owner); }
                    continue;
                }
                if(pr.x < 0 || pr.x > canvas.width) projectiles.splice(i, 1);
            }
            sendNet({type: 'h-state', p1: player1, p2: player2, projectiles, screenShake});
        } else {
            sendNet({type: 'c-inputs', inputs});
        }

        ctx.fillStyle = map.bgGrad[1]; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = map.platColor; PLATFORMS.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

        if(player1 && player2) {
            ctx.fillStyle = player1.color; ctx.fillRect(player1.x, player1.y, player1.w, player1.h);
            ctx.fillStyle = player2.color; ctx.fillRect(player2.x, player2.y, player2.w, player2.h);
            document.getElementById('hp-p1').style.width = `${(player1.hp / player1.maxHp)*100}%`;
            document.getElementById('hp-p2').style.width = `${(player2.hp / player2.maxHp)*100}%`;
        }
        ctx.fillStyle = "#fff"; projectiles.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
        gameLoopId = requestAnimationFrame(battleLoop);
    }

    function endGameDisplay(winner) { cancelAnimationFrame(gameLoopId); document.getElementById('victory-text').innerText = `¡GANADOR P${winner}!`; changeScreen('screen-over'); }
    changeScreen('screen-menu'); updateLobbyUI();
</script>
</body>
</html>
