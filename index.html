<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Showdown: Absolute Fix Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; user-select: none; image-rendering: pixelated; }
        body {
            margin: 0; padding: 0; background-color: #06060c; color: #fff;
            font-family: 'Press Start 2P', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }
        #game-container {
            position: relative; width: 800px; height: 450px;
            border: 6px double #3f3f6f; box-shadow: 0 0 35px rgba(5,217,232,0.15); background: #000;
        }
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(8, 8, 16, 0.98); z-index: 10; padding: 20px; text-align: center;
        }
        .hidden { display: none !important; }
        h1 { font-size: 24px; color: #ff2a6d; text-shadow: 3px 3px #05d9e8; margin-bottom: 5px; }
        h2 { font-size: 11px; color: #f5b041; margin-bottom: 25px; }
        .btn {
            background: #1c1c3a; color: white; border: 3px solid #3f3f6f;
            padding: 12px 24px; font-family: 'Press Start 2P', monospace; font-size: 11px;
            cursor: pointer; margin: 8px; box-shadow: 4px 4px 0px #ff2a6d;
        }
        .btn:hover:not(:disabled) { background: #ff2a6d; border-color: #fff; box-shadow: 2px 2px 0px #05d9e8; }
        .btn:disabled { background: #222 !important; border-color: #444 !important; color: #666 !important; box-shadow: none !important; }
        .input-retro {
            font-family: 'Press Start 2P', monospace; font-size: 18px; padding: 10px;
            background: #000; border: 3px solid #ff2a6d; color: #05d9e8; text-align: center; margin: 15px; letter-spacing: 6px; outline: none;
        }
        .lobby-panel { display: flex; justify-content: space-between; width: 95%; background: #0a0a14; border: 3px ridge #3f3f6f; padding: 15px; margin-bottom: 15px; }
        .player-slot { width: 48%; padding: 12px; background: #04040a; border: 3px solid #222; text-align: left; }
        .player-slot.connected { border-color: #05ff60; }
        .player-title { font-size: 9px; margin-bottom: 8px; color: #777; }
        .player-slot.connected .player-title { color: #05ff60; }
        .char-preview-text { font-size: 8px; color: #999; line-height: 1.5; margin-top: 8px; }
        .map-select-area { font-size: 10px; margin-bottom: 15px; background: #111; padding: 8px; border: 2px solid #3f3f6f; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 20px; z-index: 5; pointer-events: none; }
        .player-hud { width: 38%; }
        .bar-container { width: 100%; height: 16px; background: #1a1a26; border: 2px solid #fff; box-shadow: 3px 3px 0px #000; }
        .hp-bar { width: 100%; height: 100%; background: #05ff60; transition: width 0.1s ease-out; }
        .status-msg { font-size: 9px; color: #05d9e8; margin-top: 12px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud" class="hidden">
            <div class="player-hud">
                <div id="name-p1" style="font-size:10px;">P1</div>
                <div class="bar-container"><div class="hp-bar" id="hp-p1"></div></div>
            </div>
            <div class="player-hud" style="text-align: right;">
                <div id="name-p2" style="font-size:10px;">P2</div>
                <div class="bar-container"><div class="hp-bar" id="hp-p2" style="float: right;"></div></div>
            </div>
        </div>

        <div id="screen-menu" class="screen">
            <h1>RETRO SHOWDOWN</h1>
            <h2>CHROMEBOOK REAL-SYNC EDITION</h2>
            <button class="btn" onclick="startAudio(); openModeMenu('vs-bot')">1 JUGADOR (VS BOT)</button>
            <button class="btn" onclick="startAudio(); openModeMenu('lan')">MULTIJUGADOR (MISMO INTERNET)</button>
        </div>

        <div id="screen-lan-menu" class="screen hidden">
            <h2>MULTIJUGADOR LOCAL</h2>
            <p style="font-size:8px; color:#ff2a6d; margin-bottom:20px;">CONEXIÓN DIRECTA POR PROTOCOLO LIBRE</p>
            <button class="btn" onclick="initNetwork('host')">CREAR SALA</button>
            <button class="btn" onclick="showJoinScreen()">UNIRSE A SALA</button>
            <button class="btn" onclick="location.reload()" style="background:#333;">VOLVER</button>
        </div>

        <div id="screen-lobby-join" class="screen hidden">
            <h2>UNIRSE A SALA</h2>
            <p style="font-size:9px;">Introduce el código numérico del Host:</p>
            <input type="text" id="input-room-id" class="input-retro" maxlength="4" placeholder="0000">
            <button class="btn" onclick="initNetwork('client')">CONECTAR AHORA</button>
            <button class="btn" onclick="openModeMenu('lan')" style="font-size:8px;">ATRÁS</button>
        </div>

        <div id="screen-lobby-room" class="screen hidden">
            <h2 id="lobby-main-title">SALA DE SELECCIÓN</h2>
            
            <div id="lan-code-container" style="font-size: 11px; margin-bottom: 15px; color:#05d9e8;" class="hidden">
                CÓDIGO DE LA SALA: <span id="room-code-display" style="font-size:20px; color:#fff; background:#111; padding:4px 12px; border:2px solid #ff2a6d;">----</span>
            </div>

            <div class="lobby-panel">
                <div class="player-slot connected" id="slot-p1">
                    <div class="player-title" id="title-p1">🕹️ TU (P1)</div>
                    <div id="name-preview-p1" style="font-size:11px;">Guerrero</div>
                    <div class="char-preview-text" id="desc-preview-p1"></div>
                    <button class="btn" id="p1-change-btn" onclick="changeCharacter(1)" style="font-size:8px; padding:6px; margin-top:8px;">Cambiar [D]</button>
                </div>
                <div class="player-slot" id="slot-p2">
                    <div class="player-title" id="title-p2">🚫 RIVAL</div>
                    <div id="name-preview-p2" style="font-size:11px; color:#666;">Vacío</div>
                    <div class="char-preview-text" id="desc-preview-p2"></div>
                    <button class="btn hidden" id="change-bot-char-btn" onclick="changeCharacter(2)" style="font-size:8px; padding:6px; margin-top:8px;">Cambiar Bot</button>
                    
                    <div id="bot-difficulty-area" class="hidden" style="margin-top:10px; border-top:2px dashed #3f3f6f; padding-top:8px;">
                        <span style="font-size:8px; color:#f5b041;">DIFICULTAD:</span>
                        <select id="bot-diff-select" style="font-family:'Press Start 2P'; font-size:8px; background:#000; color:#fff; padding:2px;" onchange="updateBotDifficulty()">
                            <option value="easy">FÁCIL</option>
                            <option value="normal" selected>NORMAL</option>
                            <option value="hard">DIFÍCIL</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="map-select-area">
                <span>ESCENARIO: </span><span id="map-name-display" style="color:#ff2a6d;">Castillo Neon</span>
                <button class="btn" id="change-map-btn" onclick="cycleMap()" style="padding:5px 10px; font-size:8px; margin-left:10px;">Siguiente</button>
            </div>

            <button class="btn" id="start-match-btn" disabled onclick="triggerStartGame()">¡INICIAR COMBATE SIMULTÁNEO!</button>
            <div class="status-msg" id="lobby-error-msg"></div>
        </div>

        <div id="screen-over" class="screen hidden">
            <h1 id="victory-text">¡GANADOR!</h1>
            <button class="btn" onclick="location.reload()">VOLVER AL MENÚ</button>
        </div>

        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // AUDIO SYNTH SISTEMA RETRO
    let audioCtx = null;
    function startAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSound(t) {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (t === 'hit') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (t === 'shoot') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(450, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.start(); osc.stop(audioCtx.currentTime + 0.08);
        }
    }

    const CHARACTERS = [
        { name: "GUERRERO", color: "#05d9e8", weapon: "sword", desc: "Ataques de espada.\nArmadura reforzada.", hp: 130, speed: 4.5 },
        { name: "ARQUERO", color: "#05ff60", weapon: "bow", desc: "Disparos veloces.\nGran agilidad táctica.", hp: 95, speed: 5.8 },
        { name: "MAGO", color: "#b537ff", weapon: "magic", desc: "Lanza proyectiles místicos.\nAlto impacto.", hp: 105, speed: 4.8 }
    ];

    const MAPS = [
        { name: "Castillo Neon", bg: "#0a0a18", grid: "#191930", platColor: "#ff2a6d", groundColor: "#05d9e8" },
        { name: "Fisura Volcánica", bg: "#1a0404", grid: "#330b0b", platColor: "#f5b041", groundColor: "#ff4500" }
    ];

    const PLATFORMS = [{x: 0, y: 390, w: 800, h: 60}, {x: 100, y: 280, w: 200, h: 20}, {x: 500, y: 280, w: 200, h: 20}, {x: 300, y: 180, w: 200, h: 20}];

    let currentGameMode = null; 
    let role = null, roomId = null, ws = null;
    let p1Choice = 0, p2Choice = 0, selectedMapIndex = 0;
    let isP2Connected = false;
    let botDifficulty = "normal";
    
    let inputs = { KeyA: false, KeyD: false, KeyW: false, KeyF: false };
    let player1 = null, player2 = null;
    let projectiles = [], particles = [], gameLoopId = null;

    function openModeMenu(mode) {
        if (mode === 'lan') { changeScreen('screen-lan-menu'); }
        else if (mode === 'vs-bot') {
            currentGameMode = 'bot'; isP2Connected = true;
            changeScreen('screen-lobby-room');
            document.getElementById('lobby-main-title').innerText = "MODO VS BOT COGNITIVO";
            document.getElementById('lan-code-container').classList.add('hidden');
            document.getElementById('change-bot-char-btn').classList.remove('hidden');
            document.getElementById('bot-difficulty-area').classList.remove('hidden');
            document.getElementById('start-match-btn').removeAttribute('disabled');
            updateLobbyUI();
        }
    }

    function showJoinScreen() { changeScreen('screen-lobby-join'); }
    function changeScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById('hud').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    // INTERCONEXIÓN MEJORADA FILTRADA POR ID DE SALA OBLIGATORIO
    function initNetwork(selectedRole) {
        currentGameMode = 'lan'; role = selectedRole;
        
        if (role === 'host') {
            roomId = Math.floor(1000 + Math.random() * 9000).toString();
            changeScreen('screen-lobby-room');
            document.getElementById('lan-code-container').classList.remove('hidden');
            document.getElementById('room-code-display').innerText = roomId;
            document.getElementById('lobby-error-msg').innerText = "Abriendo compuerta local... Espera a tu amigo.";
        } else {
            roomId = document.getElementById('input-room-id').value.trim();
            if(!roomId) return alert("¡Introduce el código del Host primero!");
            changeScreen('screen-lobby-room');
            document.getElementById('lan-code-container').classList.remove('hidden');
            document.getElementById('room-code-display').innerText = roomId;
            document.getElementById('change-map-btn').classList.add('hidden');
            document.getElementById('lobby-error-msg').innerText = "Enlazando directamente con la sala del Host...";
        }

        // Conexión estable libre de bloqueos escolares corporativos
        ws = new WebSocket("wss://wss.javascript.info/chat");

        ws.onopen = () => {
            if (role === 'client') {
                sendNet({type: 'join-request'});
            }
            // Bucle persistente de sincronización del Lobby
            setInterval(() => {
                if (ws.readyState === WebSocket.OPEN && !player1) {
                    if (role === 'host') sendNet({type: 'lobby-sync', p1Choice, selectedMapIndex, isP2Connected});
                    else sendNet({type: 'client-lobby-choice', choice: p1Choice});
                }
            }, 250);
        };

        ws.onmessage = (e) => {
            try {
                let packet = JSON.parse(e.data);
                // CORRECCIÓN CLAVE: Ignorar por completo paquetes de salas ajenas o de nosotros mismos
                if (packet.room !== roomId || packet.sender === role) return;

                if (packet.type === 'join-request' && role === 'host') {
                    isP2Connected = true;
                    document.getElementById('lobby-error-msg').innerText = "¡Tu amigo se ha conectado como P2!";
                    sendNet({type: 'lobby-sync', p1Choice, selectedMapIndex, isP2Connected: true});
                    updateLobbyUI();
                }
                if (packet.type === 'lobby-sync' && role === 'client') {
                    isP2Connected = packet.isP2Connected;
                    p2Choice = packet.p1Choice; // El personaje del Host es el P2 visual del invitado
                    selectedMapIndex = packet.selectedMapIndex;
                    document.getElementById('lobby-error-msg').innerText = "¡Sala enlazada con éxito! Esperando inicio...";
                    updateLobbyUI();
                }
                if (packet.type === 'client-lobby-choice' && role === 'host') {
                    p2Choice = packet.choice;
                    updateLobbyUI();
                }
                if (packet.type === 'start-match') {
                    if(role === 'client') { p1Choice = packet.p2Choice; p2Choice = packet.p1Choice; }
                    selectedMapIndex = packet.mapIndex;
                    startActualCombat();
                }
                if (packet.type === 'game-update' && player2) {
                    player2.x = packet.x; player2.y = packet.y; player2.facing = packet.facing;
                    player2.hp = packet.hp; player2.attackAnimFrame = packet.attackAnimFrame;
                }
                if (packet.type === 'spawn-projectile' && player2) {
                    projectiles.push({x: packet.x, y: packet.y, vx: packet.vx, owner: 2, color: player2.color});
                }
                if (packet.type === 'match-over') endGameDisplay(packet.winner);
            } catch(err){}
        };
    }

    function sendNet(obj) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            obj.room = roomId; obj.sender = role;
            ws.send(JSON.stringify(obj));
        }
    }

    function changeCharacter(pNum) {
        if (pNum === 1) p1Choice = (p1Choice + 1) % CHARACTERS.length;
        else if (pNum === 2 && currentGameMode === 'bot') p2Choice = (p2Choice + 1) % CHARACTERS.length;
        updateLobbyUI();
    }

    function updateBotDifficulty() { botDifficulty = document.getElementById('bot-diff-select').value; }
    
    function cycleMap() { 
        if(role === 'client') return;
        selectedMapIndex = (selectedMapIndex + 1) % MAPS.length; 
        updateLobbyUI(); 
    }

    function updateLobbyUI() {
        // Fijar textos locales de P1
        document.getElementById('name-preview-p1').innerText = CHARACTERS[p1Choice].name;
        document.getElementById('name-preview-p1').style.color = CHARACTERS[p1Choice].color;
        document.getElementById('desc-preview-p1').innerText = CHARACTERS[p1Choice].desc;

        // CORRECCIÓN: Colocar al amigo en el P2 de forma estricta
        if (isP2Connected) {
            document.getElementById('slot-p2').classList.add('connected');
            document.getElementById('title-p2').innerText = currentGameMode === 'bot' ? "🤖 BOT" : "🕹️ TU AMIGO (P2)";
            document.getElementById('name-preview-p2').innerText = CHARACTERS[p2Choice].name;
            document.getElementById('name-preview-p2').style.color = CHARACTERS[p2Choice].color;
            document.getElementById('desc-preview-p2').innerText = CHARACTERS[p2Choice].desc;
            
            if(role === 'host' || currentGameMode === 'bot') {
                document.getElementById('start-match-btn').removeAttribute('disabled');
            }
        }
        
        // El mapa ahora se fuerza a renderizar su nombre guardado de forma inmediata
        document.getElementById('map-name-display').innerText = MAPS[selectedMapIndex].name;
    }

    function triggerStartGame() {
        if (currentGameMode === 'lan') {
            sendNet({type: 'start-match', p1Choice, p2Choice, mapIndex: selectedMapIndex});
        }
        startActualCombat();
    }

    window.addEventListener('keydown', e => { if (['KeyA','KeyD','KeyW','KeyF'].includes(e.code)) inputs[e.code] = true; });
    window.addEventListener('keyup', e => { if (['KeyA','KeyD','KeyW','KeyF'].includes(e.code)) inputs[e.code] = false; });

    class Fighter {
        constructor(index, x, y, data, isBot = false) {
            this.index = index; this.x = x; this.y = y; this.w = 36; this.h = 52;
            this.name = data.name; this.color = data.color; this.weapon = data.weapon;
            this.maxHp = data.hp; this.hp = data.hp; this.speed = data.speed;
            this.vx = 0; this.vy = 0; this.facing = index === 1 ? 1 : -1;
            this.grounded = false; this.attackCooldown = 0; this.isBot = isBot;
            this.animTimer = 0; this.attackAnimFrame = 0;
        }

        update() {
            this.animTimer += 0.15;
            if (this.isBot) {
                this.executeBotAI();
            } else {
                if (inputs['KeyA']) { this.vx = -this.speed; this.facing = -1; }
                else if (inputs['KeyD']) { this.vx = this.speed; this.facing = 1; }
                else { this.vx = 0; }
                if (inputs['KeyW'] && this.grounded) { this.vy = -13; this.grounded = false; }
                if (inputs['KeyF'] && this.attackCooldown <= 0) this.triggerAttack();
            }

            this.vy += 0.65; this.x += this.vx; this.y += this.vy;
            if(this.attackCooldown > 0) { this.attackCooldown--; this.attackAnimFrame++; } else { this.attackAnimFrame = 0; }
            if (this.x < 0) this.x = 0; if (this.x + this.w > canvas.width) this.x = canvas.width - this.w;

            if (currentGameMode === 'lan' && this.index === 1) {
                sendNet({type: 'game-update', x: this.x, y: this.y, facing: this.facing, hp: this.hp, attackAnimFrame: this.attackAnimFrame});
            }
        }

        executeBotAI() {
            let target = player1; let dist = target.x - this.x;
            let tick = botDifficulty === 'easy' ? 0.02 : (botDifficulty === 'normal' ? 0.05 : 0.09);
            if (Math.random() < tick) {
                if (Math.abs(dist) > (this.weapon === 'sword' ? 45 : 250)) {
                    this.vx = Math.sign(dist) * this.speed * 0.8; this.facing = Math.sign(dist);
                } else {
                    this.vx = 0; if (this.attackCooldown <= 0) this.triggerAttack();
                }
                if (target.y < this.y - 40 && this.grounded && Math.random() < 0.4) { this.vy = -12; this.grounded = false; }
            }
        }

        triggerAttack() {
            this.attackCooldown = 25;
            if (this.weapon === 'sword') {
                playSound('hit');
                let target = player2; 
                let rangeBox = { x: this.facing === 1 ? this.x + this.w : this.x - 55, y: this.y, w: 55, h: this.h };
                if (rangeBox.x < target.x + target.w && rangeBox.x + rangeBox.w > target.x && rangeBox.y < target.y + target.h && rangeBox.y + rangeBox.h > target.y) {
                    target.hp -= 15; createHitParticles(target.x+15, target.y+20, this.color);
                    if (target.hp <= 0) { target.hp = 0; handleMatchEnd(1); }
                }
            } else {
                playSound('shoot');
                let projX = this.x + (this.facing === 1 ? this.w : -12);
                let projVx = this.facing * 9;
                projectiles.push({x: projX, y: this.y + 22, vx: projVx, owner: 1, color: this.color});
                if (currentGameMode === 'lan') {
                    sendNet({type: 'spawn-projectile', x: projX, y: this.y + 22, vx: projVx});
                }
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x + this.w/2, this.y + this.h/2);
            if (this.facing === -1) ctx.scale(-1, 1);

            let bob = Math.sin(this.animTimer) * 3;
            ctx.fillStyle = "#e0a060"; ctx.fillRect(-12, -24 + bob, 24, 16);
            ctx.fillStyle = this.color; ctx.fillRect(-12, -26 + bob, 24, 6); 
            ctx.fillStyle = "#000"; ctx.fillRect(4, -18 + bob, 4, 4); 

            ctx.fillStyle = this.color; ctx.fillRect(-14, -8 + bob, 28, 22);
            ctx.fillStyle = "#111"; ctx.fillRect(-10, 14, 8, 12); ctx.fillRect(2, 14, 8, 12);

            ctx.fillStyle = "#ffffff";
            if (this.weapon === 'sword') {
                if (this.attackAnimFrame > 0 && this.attackAnimFrame < 12) {
                    ctx.rotate(1.3); ctx.fillRect(4, -36, 8, 38); 
                } else {
                    ctx.fillRect(8, -22 + bob, 6, 24); 
                }
            } else if (this.weapon === 'bow') {
                ctx.fillStyle = "#f5b041"; ctx.fillRect(10, -14 + bob, 4, 28);
            } else {
                ctx.fillStyle = "#b537ff"; ctx.fillRect(8, -24 + bob, 6, 30);
            }
            ctx.restore();
        }
    }

    function createHitParticles(x, y, color) {
        for (let i = 0; i < 10; i++) {
            particles.push({x: x, y: y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, size: Math.random()*4+2, life: 15, color: color});
        }
    }

    function handleMatchEnd(winnerIndex) {
        if (currentGameMode === 'lan' && role === 'host') sendNet({type: 'match-over', winner: winnerIndex});
        endGameDisplay(winnerIndex);
    }

    function startActualCombat() {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById('hud').classList.remove('hidden');

        player1 = new Fighter(1, 150, 200, CHARACTERS[p1Choice], false);
        player2 = new Fighter(2, 650, 200, CHARACTERS[p2Choice], currentGameMode === 'bot');

        document.getElementById('name-p1').innerText = role === 'client' ? "P2" : "P1";
        document.getElementById('name-p2').innerText = currentGameMode === 'bot' ? "BOT" : (role === 'client' ? "P1" : "P2");

        projectiles = []; particles = [];
        if(gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoopId = requestAnimationFrame(battleLoop);
    }

    function battleLoop() {
        let map = MAPS[selectedMapIndex];
        player1.update();

        if (currentGameMode === 'bot') player2.update();

        [player1, player2].forEach(p => {
            p.grounded = false;
            PLATFORMS.forEach(plat => {
                if (p.x + p.w > plat.x && p.x < plat.x + plat.w && p.y + p.h >= plat.y && p.y + p.h - p.vy <= plat.y + 10 && p.vy >= 0) {
                    p.y = plat.y - p.h; p.vy = 0; p.grounded = true;
                }
            });
        });

        for (let i = projectiles.length - 1; i >= 0; i--) {
            let pr = projectiles[i]; pr.x += pr.vx;
            let target = pr.owner === 1 ? player2 : player1;
            if (pr.x > target.x && pr.x < target.x + target.w && pr.y > target.y && pr.y < target.y + target.h) {
                if(pr.owner === 1) { 
                    target.hp -= 10;
                    if(target.hp <= 0) { target.hp = 0; handleMatchEnd(1); }
                }
                projectiles.splice(i, 1); playSound('hit'); continue;
            }
            if(pr.x < 0 || pr.x > canvas.width) projectiles.splice(i, 1);
        }

        ctx.fillStyle = map.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = map.grid; ctx.lineWidth = 1;
        for (let i = 0; i < canvas.width; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
        for (let j = 0; j < canvas.height; j += 40) { ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke(); }

        PLATFORMS.forEach(p => {
            ctx.fillStyle = map.groundColor; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = map.platColor; ctx.fillRect(p.x, p.y, p.w, 4);
        });

        player1.draw();
        player2.draw();

        projectiles.forEach(p => { ctx.fillStyle = "#fff"; ctx.fillRect(p.x, p.y, 14, 5); });

        for (let i = particles.length - 1; i >= 0; i--) {
            let pt = particles[i]; pt.x += pt.vx; pt.y += pt.vy; pt.life--;
            ctx.fillStyle = pt.color; ctx.fillRect(pt.x, pt.y, pt.size, pt.size);
            if (pt.life <= 0) particles.splice(i, 1);
        }

        document.getElementById('hp-p1').style.width = `${(player1.hp / player1.maxHp)*100}%`;
        document.getElementById('hp-p2').style.width = `${(player2.hp / player2.maxHp)*100}%`;

        gameLoopId = requestAnimationFrame(battleLoop);
    }

    function endGameDisplay(winner) { 
        cancelAnimationFrame(gameLoopId); 
        document.getElementById('victory-text').innerText = currentGameMode === 'bot' ? (winner === 1 ? "¡VICTORIA!" : "BOT GANÓ") : (winner === 1 ? "¡GANASTE!" : "PERDISTE"); 
        changeScreen('screen-over'); 
    }

    changeScreen('screen-menu');
</script>
</body>
