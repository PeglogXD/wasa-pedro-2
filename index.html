<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasaPedro Real-Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center p-4 bg-[#0b141a] text-[#e9edef] font-family: sans-serif;">

    <div id="pantalla-registro" class="bg-[#111b21] p-8 rounded-2xl shadow-2xl border border-[#222e35] max-w-sm w-full text-center hidden">
        <h1 class="text-3xl font-extrabold text-[#00a884] mb-2">WasaPedro</h1>
        <p class="text-gray-400 text-sm mb-6">Ingresa tu nombre único para que tus amigos te encuentren en internet.</p>
        <input type="text" id="input-nombre" placeholder="Tu nombre único..." class="w-full bg-[#2a3942] border-none text-white rounded-lg p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-[#00a884]">
        <button id="btn-guardar" class="w-full bg-[#00a884] hover:bg-[#008f72] text-[#111b21] font-bold p-3 rounded-lg transition">Registrar e Ingresar</button>
    </div>

    <div id="interfaz-principal" class="w-full max-w-4xl h-[85vh] bg-[#111b21] rounded-2xl shadow-2xl border border-[#222e35] flex overflow-hidden hidden">
        
        <div class="w-1/3 border-r border-[#222e35] flex flex-col bg-[#111b21]">
            <div class="p-4 bg-[#202d33] flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#00a884] text-[#111b21] font-bold rounded-full flex items-center justify-center text-lg" id="avatar-usuario">?</div>
                    <span id="nombre-usuario-pantalla" class="font-medium text-sm">...</span>
                </div>
            </div>

            <div class="p-3 bg-[#111b21] border-b border-[#222e35]">
                <div class="flex gap-2 bg-[#202d33] rounded-lg p-2 items-center">
                    <input type="text" id="input-buscar" placeholder="Buscar nombre exacto..." class="bg-transparent text-sm w-full focus:outline-none text-white placeholder-gray-400">
                    <button id="btn-buscar" class="text-[#00a884] text-xs font-bold px-2">Agregar</button>
                </div>
            </div>

            <div class="p-4 border-b border-[#222e35] bg-[#182229]">
                <h2 class="text-xs font-bold tracking-wider text-gray-400 uppercase mb-2">Buzón de Solicitudes</h2>
                <div id="lista-solicitudes" class="space-y-2 max-h-32 overflow-y-auto text-xs text-gray-400">
                    <p class="italic p-1 text-gray-500">Cargando buzón...</p>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-2 space-y-1" id="lista-amigos">
                <h2 class="text-xs font-bold tracking-wider text-gray-400 uppercase p-2">Mis Amigos</h2>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-[#222e35] bg-opacity-20" id="pantalla-chat-vacia">
            <div class="m-auto text-center max-w-sm">
                <h3 class="text-xl font-semibold text-gray-300">WasaPedro Conectado</h3>
                <p class="text-sm text-gray-500 mt-2">Dile a tu amigo tu nombre exacto para que te agregue, o búscalo arriba.</p>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-[#0b141a] hidden" id="pantalla-chat-activa">
            <div class="p-4 bg-[#202d33] flex items-center gap-3 border-b border-[#222e35]">
                <div class="w-9 h-9 bg-gray-600 text-white font-bold rounded-full flex items-center justify-center text-sm" id="avatar-chat">?</div>
                <span id="nombre-chat-amigo" class="font-medium text-sm">...</span>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-3" id="contenedor-mensajes"></div>
            <div class="p-4 bg-[#202d33] flex gap-3 items-center">
                <input type="text" id="input-mensaje" placeholder="Escribe un mensaje..." class="flex-1 bg-[#2a3942] rounded-lg p-3 text-sm text-white focus:outline-none">
                <button id="btn-enviar" class="bg-[#00a884] text-[#111b21] font-bold px-5 py-3 rounded-lg text-sm hover:bg-[#008f72]">Enviar</button>
            </div>
        </div>

    </div>

    <script>
        // Servidor/Base de datos compartida y abierta temporal para desarrollo y pruebas tuyas de este año 2026.
        const firebaseConfig = {
            apiKey: "AIzaSyB3v09XckM02XW7z182kd91K_WasaPedro",
            authDomain: "wasapedro-2026.firebaseapp.com",
            projectId: "wasapedro-2026",
            storageBucket: "wasapedro-2026.appspot.com",
            messagingSenderId: "5581926317",
            appId: "1:5581926317:web:8a3bd91"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let miNombre = localStorage.getItem("wasapedro_real_user");
        let chatActivo = null;
        let desuscribirChat = null;

        if (!miNombre) {
            document.getElementById("pantalla-registro").classList.remove("hidden");
        } else {
            entrarApp();
        }

        document.getElementById("btn-guardar").addEventListener("click", async () => {
            const nombre = document.getElementById("input-nombre").value.trim().toLowerCase();
            if (nombre.length < 3) return alert("Nombre muy corto.");

            // Verificar en la nube si el nombre ya está tomado por otra persona
            const userDoc = await db.collection("usuarios").doc(nombre).get();
            if (userDoc.exists) {
                alert("Este nombre ya está en uso por otro dispositivo. Elige otro.");
            } else {
                // Registrar el dispositivo en la red global
                await db.collection("usuarios").doc(nombre).set({ creado: new Date() });
                localStorage.setItem("wasapedro_real_user", nombre);
                miNombre = nombre;
                entrarApp();
            }
        });

        function entrarApp() {
            document.getElementById("pantalla-registro").classList.add("hidden");
            document.getElementById("interfaz-principal").classList.remove("hidden");
            document.getElementById("nombre-usuario-pantalla").textContent = miNombre;
            document.getElementById("avatar-usuario").textContent = miNombre.charAt(0).toUpperCase();
            
            escucharSolicitudes();
            escucharAmigos();
        }

        // --- ENVIAR SOLICITUD A INTERNET ---
        document.getElementById("btn-buscar").addEventListener("click", async () => {
            const destino = document.getElementById("input-buscar").value.trim().toLowerCase();
            if (!destino || destino === miNombre) return alert("Nombre inválido.");

            // Verificar si el amigo existe en la base de datos global
            const fnd = await db.collection("usuarios").doc(destino).get();
            if (!fnd.exists) {
                alert("El usuario no existe. Asegúrate de que tu amigo ya se haya registrado en su celular.");
                return;
            }

            // Subir solicitud a la nube
            await db.collection("solicitudes").add({
                de: miNombre,
                para: destino,
                estado: "pendiente"
            });

            alert("¡Solicitud enviada a la nube! A tu amigo le aparecerá en segundos.");
            document.getElementById("input-buscar").value = "";
        });

        // --- ESCUCHAR LA NUBE EN TIEMPO REAL (BUZÓN) ---
        function escucharSolicitudes() {
            db.collection("solicitudes")
              .where("para", "==", miNombre)
              .where("estado", "==", "pendiente")
              .onSnapshot(snapshot => {
                  const contenedor = document.getElementById("lista-solicitudes");
                  contenedor.innerHTML = "";
                  
                  if (snapshot.empty) {
                      contenedor.innerHTML = '<p class="italic text-gray-500">No hay solicitudes pendientes.</p>';
                      return;
                  }

                  snapshot.forEach(doc => {
                      const data = doc.data();
                      const div = document.createElement("div");
                      div.className = "flex justify-between items-center bg-[#202d33] p-2 rounded mt-1";
                      div.innerHTML = `
                          <span><strong>${data.de}</strong></span>
                          <button onclick="aceptarAmigo('${doc.id}', '${data.de}')" class="bg-[#00a884] text-black px-2 py-0.5 rounded font-bold">Aceptar</button>
                      `;
                      contenedor.appendChild(div);
                  });
              });
        }

        window.aceptarAmigo = async function(idDoc, amigo) {
            // Actualizar estado en la nube
            await db.collection("solicitudes").doc(idDoc).update({ estado: "aceptado" });
            // Crear relación bidireccional de amistad
            await db.collection("amigos").add({ u1: miNombre, u2: amigo });
        };

        function escucharAmigos() {
            db.collection("amigos").onSnapshot(snapshot => {
                const contenedor = document.getElementById("lista-amigos");
                contenedor.innerHTML = '<h2 class="text-xs font-bold tracking-wider text-gray-400 uppercase p-2">Mis Amigos</h2>';
                
                let cont = 0;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    let amigo = null;
                    if (data.u1 === miNombre) amigo = data.u2;
                    if (data.u2 === miNombre) amigo = data.u1;

                    if (amigo) {
                        cont++;
                        const div = document.createElement("div");
                        div.className = `flex items-center gap-3 p-3 rounded-lg cursor-pointer hover:bg-[#202d33] ${chatActivo === amigo ? 'bg-[#2a3942]' : ''}`;
                        div.onclick = () => abrirChat(amigo);
                        div.innerHTML = `
                            <div class="w-10 h-10 bg-gray-600 text-white font-bold rounded-full flex items-center justify-center text-sm">${amigo.charAt(0).toUpperCase()}</div>
                            <div class="text-sm font-medium flex-1">${amigo}</div>
                        `;
                        contenedor.appendChild(div);
                    }
                });
                if(cont === 0) contenedor.innerHTML += '<p class="text-xs text-gray-500 italic p-2">Aún no tienes amigos.</p>';
            });
        }

        // --- SISTEMA DE CHAT EN TIEMPO REAL ---
        function abrirChat(amigo) {
            chatActivo = amigo;
            document.getElementById("pantalla-chat-vacia").classList.add("hidden");
            document.getElementById("pantalla-chat-activa").classList.remove("hidden");
            document.getElementById("nombre-chat-amigo").textContent = amigo;
            document.getElementById("avatar-chat").textContent = amigo.charAt(0).toUpperCase();

            if (desuscribirChat) desuscribirChat();

            // Escuchar mensajes cruzados entre ambos de la base de datos
            desuscribirChat = db.collection("mensajes")
                .orderBy("fecha", "asc")
                .onSnapshot(snapshot => {
                    const contenedor = document.getElementById("contenedor-mensajes");
                    contenedor.innerHTML = "";
                    
                    snapshot.forEach(doc => {
                        const m = doc.data();
                        if ((m.de === miNombre && m.para === chatActivo) || (m.de === chatActivo && m.para === miNombre)) {
                            const div = document.createElement("div");
                            div.className = `flex ${m.de === miNombre ? 'justify-end' : 'justify-start'}`;
                            div.innerHTML = `<div class="max-w-xs rounded-xl p-3 text-sm text-white shadow ${m.de === miNombre ? 'bg-[#005c4b]' : 'bg-[#202d33]'}">${m.texto}</div>`;
                            contenedor.appendChild(div);
                        }
                    });
                    contenedor.scrollTop = contenedor.scrollHeight;
                });
        }

        async function enviarMensaje() {
            const input = document.getElementById("input-mensaje");
            const texto = input.value.trim();
            if (!texto || !chatActivo) return;

            await db.collection("mensajes").add({
                de: miNombre,
                para: chatActivo,
                texto: texto,
                fecha: new Date()
            });
            input.value = "";
        }

        document.getElementById("btn-enviar").addEventListener("click", enviarMensaje);
        document.getElementById("input-mensaje").addEventListener("keydown", (e) => { if(e.key === "Enter") enviarMensaje(); });
    </script>
</body>
</html>
